[#if configuration.style == 'start']
<a class="govuk-button govuk-button--start" data-module="govuk-button" draggable="false" href="${configuration.href}" role="button">
	<span data-lfr-editable-id="button-text-start" data-lfr-editable-type="text">Start now</span>

	<svg aria-hidden="true" class="govuk-button__start-icon" focusable="false" height="19" viewBox="0 0 33 40" width="17.5" xmlns="http://www.w3.org/2000/svg">
		<path d="M0 0h13l20 20-20 20H0l20-20z" fill="currentColor" />
	</svg>
</a>
[#else]
<button class="govuk-button${(configuration.style == 'secondary')?then(' govuk-button--secondary', '')}${(configuration.style == 'warning')?then(' govuk-button--warning', '')}" data-module="govuk-button" type="submit">
	<span data-lfr-editable-id="button-text" data-lfr-editable-type="text">Save and continue</span>
</button>
[/#if]
